<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background: rounded square, dark navy gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- Price-bar trend at the bottom: low → mid → high (green / amber / red) -->
  <g>
    <rect x="36"  y="180" width="22" height="48"  rx="3" fill="#22c55e"/>
    <rect x="64"  y="160" width="22" height="68"  rx="3" fill="#22c55e"/>
    <rect x="92"  y="140" width="22" height="88"  rx="3" fill="#22c55e"/>
    <rect x="120" y="116" width="22" height="112" rx="3" fill="#f59e0b"/>
    <rect x="148" y="140" width="22" height="88"  rx="3" fill="#22c55e"/>
    <rect x="176" y="120" width="22" height="108" rx="3" fill="#f59e0b"/>
    <rect x="204" y="92"  width="22" height="136" rx="3" fill="#ef4444"/>
  </g>

  <!-- Lightning bolt centred in the upper half, layered on top -->
  <path d="M 148 24 L 84 116 L 122 116 L 110 188 L 174 100 L 134 100 L 152 24 Z"
        fill="#fbbf24" stroke="#0f172a" stroke-width="3" stroke-linejoin="round"/>
</svg>
